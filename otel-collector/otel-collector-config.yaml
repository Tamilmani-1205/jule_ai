receivers:
  otlp:
    protocols:
      http:
        endpoint: localhost:4318
        cors:
          allowed_origins:
            - "*"
          allowed_headers:
            - "*"
      grpc:
        endpoint: localhost:4317

processors:
  batch:
    timeout: 100s
    send_batch_size: 1024

exporters:
  prometheus:
    endpoint: localhost:8889
  logging:
    loglevel: debug

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, logging]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
